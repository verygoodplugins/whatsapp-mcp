name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/LICENSE'
              - '!**/.gitignore'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'
              - '!docs/**'

  version-consistency:
    name: Version Consistency
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Validate project versions are in sync
        run: python .github/scripts/check_versions.py

  python-lint:
    name: Python Lint
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: |
          cd whatsapp-mcp-server
          uv venv
          uv pip install ruff
      - name: Run ruff check
        run: |
          cd whatsapp-mcp-server
          uv run ruff check .
      - name: Run ruff format check
        run: |
          cd whatsapp-mcp-server
          uv run ruff format --check .

  go-lint:
    name: Go Lint
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7.1
          working-directory: whatsapp-bridge

  go-build:
    name: Go Build
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build
        run: |
          cd whatsapp-bridge
          go build -v ./...

  python-test:
    name: Python Tests
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: |
          cd whatsapp-mcp-server
          uv venv
          uv pip install -e ".[dev]"
      - name: Run tests
        run: |
          cd whatsapp-mcp-server
          uv run pytest -v
