name: Release (Manual Fallback)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to validate and publish artifacts for (vMAJOR.MINOR.PATCH)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7

      - name: Validate version consistency
        run: |
          python .github/scripts/check_versions.py --tag "${{ github.event.inputs.tag }}"

      - name: Verify golangci configuration
        run: |
          cd whatsapp-bridge
          go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.7.1 config verify

      - name: Run Go lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7.1
          working-directory: whatsapp-bridge

      - name: Run Go tests
        run: |
          cd whatsapp-bridge
          go test ./...

      - name: Build Go bridge
        run: |
          cd whatsapp-bridge
          go build -v ./...

      - name: Run Python tests
        run: |
          cd whatsapp-mcp-server
          uv sync --extra dev
          uv run pytest -q

  publish-github-release:
    name: Publish GitHub Release
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: astral-sh/setup-uv@v7

      - name: Build release artifacts
        run: |
          mkdir -p dist

          cd whatsapp-bridge
          GOOS=linux GOARCH=amd64 go build -o ../dist/whatsapp-bridge-linux-amd64 .
          cd ..

          cd whatsapp-mcp-server
          uv build --out-dir ../dist
          cd ..

          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: dist/*
          generate_release_notes: true
          overwrite_files: true
