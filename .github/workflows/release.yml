name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional tag to validate (vMAJOR.MINOR.PATCH)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate Release Inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7

      - name: Validate version consistency
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          fi

          if [ -n "$TAG" ]; then
            python .github/scripts/check_versions.py --tag "$TAG"
          else
            python .github/scripts/check_versions.py
          fi

      - name: Verify golangci configuration
        run: |
          cd whatsapp-bridge
          go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.7.1 config verify

      - name: Run Go lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.7.1
          working-directory: whatsapp-bridge

      - name: Run Go tests
        run: |
          cd whatsapp-bridge
          go test ./...

      - name: Build Go bridge
        run: |
          cd whatsapp-bridge
          go build -v ./...

      - name: Run Python tests
        run: |
          cd whatsapp-mcp-server
          uv sync --extra dev
          uv run pytest -q

  publish-github-release:
    name: Publish GitHub Release
    needs: validate-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - uses: astral-sh/setup-uv@v7

      - name: Build release artifacts
        run: |
          mkdir -p dist

          cd whatsapp-bridge
          go build -o ../dist/whatsapp-bridge-linux-amd64 .
          cd ..

          cd whatsapp-mcp-server
          uv build --out-dir ../dist
          cd ..

          cd dist
          shasum -a 256 * > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
