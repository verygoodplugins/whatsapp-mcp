      mitigation: "Phase notes + issue bodies call out the distinction; test_bridge_auth.py stays bridge-only, new test_auth.py is client-only."
    - description: "AC4/AC5/AC7 partly require a live WhatsApp session + a second tailnet device (manual)."
      severity: P2
      mitigation: "Automated tests cover guard/auth/typed-errors; AC5/AC6/AC7 recorded as manual verification notes in P-IMPL-3 per spec §6.3."
    - description: "P-IMPL-2 as a single unit (auth + guard + typed errors) exceeds the ≤5-active-file right-size bar."
      severity: design
      mitigation: "Right-sized into P-IMPL-2A (auth+guard, 4 files) and P-IMPL-2B (typed errors, 4 files); both map to spec's single P-IMPL-2."
    - description: "Go bridge is a Non-Goal; an over-eager worker might edit whatsapp-bridge/ for EC2 health probing."
      severity: P1
      mitigation: "EC2 uses the EXISTING /api/health endpoint via the Python REST client only; CLAUDE.md §5 + every issue body reiterate 'do not touch the Go bridge'."

  lessons_applied:
    - "Vertical, right-sized slices (≤5 active files) — split oversized P-IMPL-2 (WBS Rule 2 / Right-Sizing)."
    - "Sequenced phases sharing main.py instead of defaulting to parallel (Overlap Detection / anti-pattern #3)."
    - "Grounded every path against the live fork + the actual PR-112 diff, not assumptions (anti-pattern #6)."
    - "No code snippets in issues — WHAT not HOW (anti-pattern #1)."
    - "CLAUDE.md doctrine: when changing a default (port 8000→8080), grep the whole surface (code+docs+tests) in one pass."
    - "One concern per issue; cross-repo P-IMPL-4 kept as a separate follow-up, not bundled (anti-pattern #5)."
