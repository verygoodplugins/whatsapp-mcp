        - { path: whatsapp-mcp-server/tests/test_run_script.py, action: CREATE, note: "EC3: script exits non-zero with the actionable message when tailscale is absent (mock CLI on PATH)" }
      files_read_only:
        - whatsapp-mcp-server/auth.py
        - whatsapp-mcp-server/main.py
      active_file_count: 5
      right_size_check: "AT LIMIT (M, 5 active files = ceiling). If the EC3 test or compose variant grows, split docs (SETUP.md/README) from scripts into a follow-up."
      acceptance_criteria:
        - "AC5 (manual): with the tailscale-serve default (loopback + Tailscale proxy), endpoint reachable from a second tailnet device and NOT from public internet — recorded."
        - "AC6: SETUP.md is copy-paste/verified; a timed dry-run completes ≤15 min, recorded in verification notes."
        - "AC10-EC3: run script detects tailnet down (no `tailscale serve`/interface) and fails fast with an actionable message — no silent loopback/public fallback."
        - "AC9 (egress slice): documented egress check shows no outbound connections to empire domains during a tool exercise."
        - "AC7 (manual): core tools (list/search/read/send/get_contact) work end-to-end over the remote transport with auth — recorded."
        - "Token rotation/revocation note present (P2-5)."
      verification_command: "cd whatsapp-mcp-server && uv run pytest tests/test_run_script.py -v && uv run ruff check . ; bash -n ../scripts/run-remote.sh"
      issue_body: |
        ## Context
        Spec: [SPEC-WAMCP-001](.specs/features/SPEC-WAMCP-001_whatsapp_remote_mcp.md) §4.1 (network posture) + AC5/AC6/AC7/AC9/AC10-EC3 · MISSION-2026-389 · P-IMPL-3. Depends on P-IMPL-2B.

        ## Objective
        Ship the `tailscale serve` run script and a ≤15-minute copy-paste SETUP guide so a non-developer can self-host securely.

        ## Acceptance Criteria
        - [ ] AC5: reachable from a 2nd tailnet device, not from public internet (recorded).
        - [ ] AC6: timed ≤15-min dry-run recorded.
        - [ ] AC10-EC3: tailnet-down → fail fast, actionable message.
        - [ ] AC7: core tools work end-to-end over remote+auth (recorded).
        - [ ] AC9 egress check documented; token rotation note included.

        ## Technical Notes
        Default posture = `tailscale serve` (server binds loopback, Tailscale proxies TLS). Funnel is opt-in only. Generate the token with `openssl rand -hex 24` (≥32 chars) so users never pick a weak one — must satisfy the P-IMPL-2A guard. Do NOT touch the Go bridge.

        ---
        *Created by Implementation Architect*

