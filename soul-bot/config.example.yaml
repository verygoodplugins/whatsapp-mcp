watched_groups:
  - jid: "YOUR_GROUP_JID@g.us"
    name: "Your support group"

operators:
  - "YOUR_OPERATOR_PHONE@s.whatsapp.net"

bot:
  auto_reply: false
  default_action: "ignore"
  question_action: "group_reply"
  weight_action: "ack"
  casual_action: "ignore"
  photo_action: "operator_review"
  sensitive_action: "operator_review"
  vision_enabled: false
  vision_provider: "none" # none | claude_code
  media_dir: "/data/media"
  claude_code_cwd: "/tmp"
  claude_code_model: "" # empty means use the local Claude Code default; e.g. "claude-opus-4-6"
  claude_code_timeout_seconds: 90
  language: "he"
  require_operator_approval_for_sensitive: true
  soul_prompt_path: "/app/SOUL.md"
  database_path: "/data/soul-bot.db"
  bridge_api_url: "http://whatsapp-bridge:8080/api"

weekly_weigh_in:
  enabled: true
  day: "sunday"
  time: "08:30"
  timezone: "Asia/Jerusalem"
  message: "בוקר טוב ❤️ זמן שקילה שבועית. כשתוכלו, שלחו תמונה חיה עם המשקל שלכם או כתבו את המשקל בפרטי."
